# Canonical manifest validation, Iteration 13 QA, ESLint (quiet), and full Vitest suite.
name: Field app contracts

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate canonical manifest + schemas vs allowlists
        run: npm run validate:canonical-manifest

      - name: ESLint
        run: npm run lint

      - name: Iteration 13 QA tests
        run: npm run test:iteration13

      - name: Full test suite (Vitest)
        run: npm test

  a11y:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install axe + puppeteer
        run: npm install --no-save axe-core puppeteer

      - name: Serve dist and run a11y sweep
        run: |
          npx serve -s dist -p 5173 &
          sleep 4
          node scripts/a11y-check.cjs
